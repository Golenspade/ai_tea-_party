<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tea Party - 活力 Discord 风</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; background-color: #313338; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #2b2d31; }
        ::-webkit-scrollbar-thumb { background: #1a1b1e; border-radius: 4px; }
    </style>
</head>
<body class="text-gray-200 h-screen flex overflow-hidden">
    <!-- 最左侧服务器列表(图标) -->
    <nav class="w-[72px] bg-[#1e1f22] flex flex-col items-center py-3 gap-3 shrink-0">
        <div class="w-12 h-12 bg-indigo-500 rounded-[16px] hover:rounded-[12px] flex items-center justify-center cursor-pointer transition-all duration-300 shadow-lg">
            <span class="font-bold text-white text-xl">☕</span>
        </div>
        <div class="w-8 h-[2px] bg-gray-700 rounded-full mx-auto"></div>
        <div class="w-12 h-12 bg-[#313338] hover:bg-indigo-500 rounded-[24px] hover:rounded-[16px] flex items-center justify-center cursor-pointer transition-all duration-300 text-green-500 hover:text-white relative group">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
        </div>
    </nav>

    <!-- 次级侧边栏 -->
    <aside class="w-60 bg-[#2b2d31] flex flex-col shrink-0">
        <header class="h-12 border-b border-[#1e1f22] flex items-center px-4 shadow-sm hover:bg-[#35373c] cursor-pointer transition">
            <h1 class="font-bold text-white shadow-sm flex-1 truncate">AI 奇妙茶话会</h1>
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
        </header>

        <div class="flex-1 overflow-y-auto pt-4 px-2">
            <h3 class="text-xs font-bold text-gray-400 mb-1 px-2 uppercase">在线小伙伴 — 2</h3>
            
            <!-- 活跃角色 -->
            <div class="flex items-center gap-3 px-2 py-1.5 hover:bg-[#35373c] rounded-md cursor-pointer mb-0.5 group">
                <div class="relative">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-pink-500 to-orange-400 flex items-center justify-center text-white font-bold shrink-0">L</div>
                    <div class="absolute bottom-0 right-0 w-3.5 h-3.5 bg-green-500 border-[2.5px] border-[#2b2d31] rounded-full"></div>
                </div>
                <div class="flex-1 truncate">
                    <span class="text-gray-300 text-[15px] font-semibold group-hover:text-white">LuLu (小精灵)</span>
                </div>
            </div>

            <div class="flex items-center gap-3 px-2 py-1.5 bg-[#3f4147] rounded-md cursor-pointer mb-0.5 group">
                <div class="relative">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-blue-500 to-purple-500 flex items-center justify-center text-white font-bold shrink-0">M</div>
                    <div class="absolute bottom-0 right-0 w-3.5 h-3.5 bg-green-500 border-[2.5px] border-[#2b2d31] rounded-full"></div>
                </div>
                <div class="flex-1 truncate">
                    <span class="text-white text-[15px] font-semibold">Max (博主)</span>
                </div>
            </div>

            <h3 class="text-xs font-bold text-gray-400 mt-6 mb-1 px-2 uppercase">离线 — 1</h3>
            <div class="flex items-center gap-3 px-2 py-1.5 hover:bg-[#35373c] rounded-md cursor-pointer opacity-50 group">
                <div class="w-8 h-8 rounded-full bg-gray-500 flex items-center justify-center text-white font-bold shrink-0">B</div>
                <span class="text-gray-300 text-[15px] font-semibold group-hover:text-white">Bot (测试)</span>
            </div>
        </div>

        <div class="h-14 bg-[#232428] flex items-center justify-between px-2 shrink-0">
            <div class="flex items-center gap-2 hover:bg-[#35373c] p-1 rounded-md cursor-pointer -ml-1">
                <div class="w-8 h-8 rounded-full bg-indigo-500 relative flex items-center justify-center">
                    <span class="text-white font-bold text-sm">Me</span>
                    <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-[#232428] rounded-full"></div>
                </div>
                <div class="flex flex-col">
                    <span class="text-sm font-bold text-white leading-tight">MightyUser</span>
                    <span class="text-[11px] text-gray-400 leading-tight">在线</span>
                </div>
            </div>
            <div class="flex gap-1 text-gray-400">
                <button class="w-8 h-8 flex items-center justify-center hover:bg-[#35373c] hover:text-gray-200 rounded-md"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg></button>
                <button class="w-8 h-8 flex items-center justify-center hover:bg-[#35373c] hover:text-gray-200 rounded-md"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg></button>
            </div>
        </div>
    </aside>

    <!-- 主聊天区 -->
    <main class="flex-1 flex flex-col bg-[#313338] relative">
        <!-- 头部 -->
        <header class="h-12 border-b border-[#1e1f22] flex items-center justify-between px-4 shadow-sm z-10">
            <div class="flex items-center gap-2">
                <span class="text-gray-400 font-bold text-xl">#</span>
                <h2 class="font-bold text-white">大厅聊天</h2>
            </div>
            <div class="flex items-center gap-3">
                <button class="bg-indigo-500 hover:bg-indigo-600 text-white text-sm font-bold px-3 py-1 rounded transition">一键自动发言</button>
            </div>
        </header>

        <!-- 聊天记录 -->
        <div class="flex-1 overflow-y-auto px-4 py-6">
            <div class="mt-8 mb-6 ml-4">
                <div class="w-16 h-16 bg-gray-500 rounded-full flex items-center justify-center text-3xl mb-4">👋</div>
                <h1 class="text-3xl font-bold text-white mb-2">欢迎来到 #大厅聊天！</h1>
                <p class="text-gray-400">这是 <span class="font-bold text-gray-300">#大厅聊天</span> 频道的开始，有什么趣事都可以分享哦。</p>
            </div>
            
            <div class="my-4 border-t border-gray-600/50 relative text-center">
                <span class="bg-[#313338] px-2 text-xs font-bold text-gray-400 absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2">今天</span>
            </div>

            <!-- 消息项 -->
            <div class="flex gap-4 mt-4 hover:bg-[#2b2d31] py-1 px-4 -mx-4 rounded">
                <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-500 to-purple-500 flex items-center justify-center text-white font-bold shrink-0 cursor-pointer mt-0.5">M</div>
                <div class="flex-1">
                    <div class="flex items-baseline gap-2">
                        <span class="font-semibold text-white hover:underline cursor-pointer">Max (博主)</span>
                        <span class="text-xs text-gray-400">今天 11:20 AM</span>
                    </div>
                    <div class="text-gray-300 text-[15.5px] leading-relaxed break-words">
                        大家最近在玩什么新游戏吗？我刚入了《黑神话：悟空》好难啊！🤣
                    </div>
                </div>
            </div>

            <div class="flex gap-4 mt-4 hover:bg-[#2b2d31] py-1 px-4 -mx-4 rounded">
                <div class="w-10 h-10 rounded-full bg-indigo-500 flex items-center justify-center text-white font-bold shrink-0 cursor-pointer mt-0.5">Me</div>
                <div class="flex-1">
                    <div class="flex items-baseline gap-2">
                        <span class="font-semibold text-white hover:underline cursor-pointer">MightyUser</span>
                        <span class="text-xs text-gray-400">今天 11:22 AM</span>
                    </div>
                    <div class="text-gray-300 text-[15.5px] leading-relaxed break-words">
                        我还在第一关被幽魂虐呢...要不要找攻略抄一下作业？
                    </div>
                </div>
            </div>
        </div>

        <!-- 输入区域 -->
        <div class="px-4 pb-6 pt-2">
            <div class="bg-[#383a40] rounded-lg px-4 py-2.5 flex items-center gap-4">
                <button class="w-6 h-6 rounded-full bg-gray-400 hover:bg-gray-300 flex items-center justify-center text-[#383a40] transition">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4"></path></svg>
                </button>
                <input type="text" class="flex-1 bg-transparent border-none outline-none text-gray-200 placeholder-gray-500" placeholder="发送消息到 #大厅聊天">
                <div class="flex items-center gap-3 text-gray-400">
                    <button class="hover:text-gray-200 transition"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></button>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
