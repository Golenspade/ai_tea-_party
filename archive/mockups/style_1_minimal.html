<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Tea Party - 极简留白风格</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      /* 隐藏滚动条但保留滚动功能 */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  </head>
  <body
    class="bg-[#FDFDFC] text-[#37352F] h-screen flex flex-col overflow-hidden"
  >
    <!-- 顶部导航条 -->
    <header
      class="h-12 border-b border-gray-200 flex items-center justify-between px-6 bg-white shrink-0"
    >
      <div class="flex items-center gap-2 font-medium text-lg text-gray-800">
        <svg
          class="w-5 h-5 text-gray-500"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"
          ></path>
        </svg>
        AI Tea Party
      </div>
      <div class="flex items-center gap-4 text-sm">
        <button class="text-gray-500 hover:text-gray-900 transition-colors">
          API 设置
        </button>
        <span class="flex items-center gap-1.5"
          ><span class="w-2 h-2 rounded-full bg-green-500"></span>已连接</span
        >
      </div>
    </header>

    <div class="flex flex-1 h-full overflow-hidden">
      <!-- 左侧边栏 -->
      <aside
        class="w-64 bg-[#F7F7F5] border-r border-gray-200 flex flex-col pt-4"
      >
        <div class="px-4 pb-4">
          <button
            class="w-full py-2 bg-white border border-gray-200 rounded-md text-sm font-medium hover:bg-gray-50 transition-colors"
          >
            + 新建议题 / 角色
          </button>
        </div>
        <div
          class="px-4 text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wider"
        >
          角色列表
        </div>
        <div class="flex-1 overflow-y-auto no-scrollbar px-2">
          <div
            class="px-2 py-1.5 mb-1 rounded-md bg-gray-200 text-gray-900 font-medium text-sm flex items-center gap-2 cursor-pointer"
          >
            <span class="text-lg">👩‍💼</span> 产品经理 (Alice)
          </div>
          <div
            class="px-2 py-1.5 mb-1 rounded-md hover:bg-gray-100 text-gray-600 text-sm flex items-center gap-2 cursor-pointer transition-colors"
          >
            <span class="text-lg">👨‍💻</span> 程序员 (Bob)
          </div>
          <div
            class="px-2 py-1.5 rounded-md hover:bg-gray-100 text-gray-600 text-sm flex items-center gap-2 cursor-pointer transition-colors"
          >
            <span class="text-lg">🎨</span> 设计师 (Charlie)
          </div>
        </div>
        <div class="p-4 border-t border-gray-200 space-y-2">
          <button
            class="w-full py-1.5 bg-gray-100 hover:bg-gray-200 rounded text-sm text-gray-700 transition"
          >
            自动发言：关
          </button>
          <button
            class="w-full py-1.5 text-red-500 hover:bg-red-50 rounded text-sm transition"
          >
            清空对话
          </button>
        </div>
      </aside>

      <!-- 主聊天区 -->
      <main class="flex-1 flex flex-col bg-white">
        <div
          class="h-12 flex items-center justify-between px-6 border-b border-gray-100 shrink-0"
        >
          <h2 class="font-medium text-gray-800">产品研讨会群聊</h2>
          <span class="text-xs px-2 py-1 bg-gray-100 rounded text-gray-500"
            >就绪</span
          >
        </div>

        <div
          class="flex-1 overflow-y-auto p-6 md:px-24 lg:px-48 space-y-6 no-scrollbar"
        >
          <!-- User Message -->
          <div class="flex gap-4">
            <div
              class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center shrink-0"
            >
              U
            </div>
            <div class="space-y-1">
              <div class="text-sm font-medium text-gray-800">
                User
                <span class="text-xs text-gray-400 font-normal ml-2"
                  >10:00 AM</span
                >
              </div>
              <div class="text-gray-700 leading-relaxed text-[15px]">
                大家觉得在新版本里加入深色模式优先级高吗？
              </div>
            </div>
          </div>

          <!-- AI Message -->
          <div class="flex gap-4">
            <div
              class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center shrink-0 text-xl"
            >
              👩‍💼
            </div>
            <div class="space-y-1">
              <div class="text-sm font-medium text-gray-800">
                Alice (主理人)
                <span class="text-xs text-gray-400 font-normal ml-2"
                  >10:01 AM</span
                >
              </div>
              <div class="text-gray-700 leading-relaxed text-[15px]">
                从用户反馈来看，深色模式的呼声确实很高。它不仅能保护用户视力，还能提升整体的现代化观感。不过，考虑到开发成本，我们需要先评估一下UI库的适配情况。
              </div>
            </div>
          </div>
        </div>

        <div class="p-4 md:px-24 lg:px-48">
          <div
            class="relative rounded-lg border border-gray-300 shadow-sm focus-within:ring-1 focus-within:ring-gray-400 focus-within:border-gray-400 bg-white p-2"
          >
            <textarea
              class="w-full bg-transparent border-0 focus:ring-0 resize-none max-h-32 text-[15px] p-2 placeholder-gray-400 outline-none"
              rows="2"
              placeholder="给 Alice 发送消息..."
            ></textarea>
            <div
              class="flex items-center justify-between mt-2 pt-2 border-t border-gray-100"
            >
              <div class="flex gap-2">
                <button class="p-1.5 text-gray-400 hover:text-gray-600 rounded">
                  <svg
                    class="w-5 h-5"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"
                    ></path>
                  </svg>
                </button>
                <button class="p-1.5 text-gray-400 hover:text-gray-600 rounded">
                  <svg
                    class="w-5 h-5"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"
                    ></path>
                  </svg>
                </button>
              </div>
              <button
                class="bg-gray-800 hover:bg-black text-white px-4 py-1.5 rounded-md text-sm font-medium transition-colors"
              >
                发送
              </button>
            </div>
          </div>
          <div class="text-center text-[11px] text-gray-400 mt-2">
            AI 可能会发生错误，请验证重要信息。
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
